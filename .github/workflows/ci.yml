name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-on-releases: true
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Python Syntax
      run: |
        python -m py_compile cisco_crawler.py parser.py report_generator.py oui_lookup.py

    - name: Verify Shell Scripts Syntax
      run: |
        # Basic bash syntax check
        bash -n run.sh
